<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Mono-bone skull glyph, silhouette synced with logo.svg, features
       optically enlarged ~12% ("HUD" optical size) for small render sizes.
       Used as the HUD health icon (26px) and death-screen mark (72px),
       loaded via <img>. The fill is hardcoded bone (#F0EAD9), NOT
       currentColor: an <img>-loaded SVG is isolated from the page, so
       currentColor/CSS vars don't resolve and the skull renders
       black-on-dark (invisible). Inline the SVG if runtime recolor is needed.
       No blood here: a health icon that bleeds is wrong semantics - gore
       belongs to the death screen FX, not the HUD. -->
  <path fill="#F0EAD9" d="M128,54
    C166,54 190,74 190,100
    C194,112 186,126 174,136
    L174,156
    C172,174 150,186 128,187
    C106,186 84,174 82,156
    L82,136
    C70,126 62,112 66,100
    C66,74 90,54 128,54 Z"/>
  <g fill="#1B1512">
    <path d="M142,97 L174,87 C180,97 179,111 170,118 C159,124 145,120 141,110 Z"/>
    <path d="M114,97 L82,87 C76,97 77,111 86,118 C97,124 111,120 115,110 Z"/>
    <path d="M120,126 L136,126 L128,150 Z"/>
    <rect x="105" y="158" width="6" height="20" rx="2"/>
    <rect x="118" y="158" width="6" height="20" rx="2"/>
    <rect x="131" y="158" width="6" height="20" rx="2"/>
    <rect x="144" y="158" width="6" height="20" rx="2"/>
  </g>
</svg>
