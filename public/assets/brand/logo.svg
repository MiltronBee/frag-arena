<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Frag Arena">
  <title>Frag Arena</title>
  <defs>
    <!-- userSpaceOnUse: the default objectBoundingBox is undefined on <line>
         (zero-area bbox) and renderers drop the stroke entirely. Locking the
         gradient to the canvas also gives each tick its own hue. -->
    <linearGradient id="sol" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0" stop-color="#14F195"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
  </defs>

  <!-- ===== Reticle: ring + 4 outer ticks =====
       Center (128,128). Ring r=88, stroke 12. Tick pills span 102-122
       from center (incl. round caps): 8px gap to ring outer edge (94),
       6px uniform safe area to canvas edge on all four sides. -->
  <g fill="none" stroke="url(#sol)" stroke-width="12" stroke-linecap="round">
    <circle cx="128" cy="128" r="88"/>
    <line x1="128" y1="12"  x2="128" y2="20"/>
    <line x1="128" y1="236" x2="128" y2="244"/>
    <line x1="12"  y1="128" x2="20"  y2="128"/>
    <line x1="236" y1="128" x2="244" y2="128"/>
  </g>

  <!-- ===== Skull =====
       Silhouette: dome -> zygomatic corner (~18 deg at 190,100) ->
       vertical mandible edge -> jaw corner (~40 deg at 174,156) -> chin.
       Fits inside ring inner edge (r=82) with 8px minimum clearance. -->
  <path fill="#F0EAD9" d="M128,54
    C166,54 190,74 190,100
    C194,112 186,126 174,136
    L174,156
    C172,174 150,186 128,187
    C106,186 84,174 82,156
    L82,136
    C70,126 62,112 66,100
    C66,74 90,54 128,54 Z"/>

  <!-- sockets (angry wedge, outer-up ~18 deg) / nose / teeth -->
  <g fill="#1B1512">
    <path d="M144,98 L172,89 C177,98 176,110 169,116 C159,121 147,117 143,109 Z"/>
    <path d="M112,98 L84,89 C79,98 80,110 87,116 C97,121 109,117 113,109 Z"/>
    <path d="M122,128 L134,128 L128,148 Z"/>
    <rect x="106" y="158" width="5" height="20" rx="2"/>
    <rect x="119" y="158" width="5" height="20" rx="2"/>
    <rect x="132" y="158" width="5" height="20" rx="2"/>
    <rect x="145" y="158" width="5" height="20" rx="2"/>
  </g>

  <!-- ===== Blood: one drip, dead on axis, hangs from chin ===== -->
  <path fill="#E53223" d="M128,183 C125,190 122,194 122,199 A6,6 0 0 0 134,199 C134,194 131,190 128,183 Z"/>
</svg>
