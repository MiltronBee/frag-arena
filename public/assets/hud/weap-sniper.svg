    <!-- scope -->
    <rect x="34" y="18" width="34" height="6"/>
    <rect x="34" y="16" width="6" height="10"/>
    <rect x="62" y="16" width="6" height="10"/>
    <!-- magazine -->
    <path d="M40 36 L52 36 L51 52 L41 52 Z"/>
    <!-- grip -->
    <path d="M24 36 L34 36 L31 52 L22 52 Z"/>
    <!-- stock -->
    <path d="M4 28 L16 28 L16 36 L4 40 Z"/>
