<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <!-- Side-profile SMG silhouette (compact, stubby). Hardcoded white fill so it
       serves as an <img> silhouette AND a CSS mask-image (see weap-rifle.svg /
       public/assets/brand/skull.svg for why currentColor can't be used). -->
  <g fill="#FFFFFF">
    <!-- body -->
    <path d="M22 26 L84 26 L84 38 L30 38 L30 44 L22 44 Z"/>
    <!-- short barrel -->
    <rect x="84" y="28" width="20" height="4"/>
    <!-- top rail -->
    <rect x="34" y="20" width="40" height="6"/>
    <!-- vertical magazine -->
    <path d="M40 38 L52 38 L51 58 L41 58 Z"/>
    <!-- grip -->
    <path d="M24 38 L34 38 L31 52 L22 52 Z"/>
    <!-- collapsed stock nub -->
    <rect x="14" y="28" width="8" height="7"/>
  </g>
</svg>
