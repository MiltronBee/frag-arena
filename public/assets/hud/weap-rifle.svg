<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <!-- Side-profile assault-rifle silhouette for the Halo-style ammo HUD.
       Fill is hardcoded white (#FFFFFF) so it works both as an <img> (a white
       silhouette) AND as a CSS mask-image (alpha shape -> CSS tints it). An
       <img>-loaded SVG can't resolve currentColor/CSS vars (see
       public/assets/brand/skull.svg), so the HUD loads it via mask-image to
       recolor it Halo-cyan. Keep it a single clean shape. -->
  <g fill="#FFFFFF">
    <!-- receiver / body -->
    <path d="M14 26 L92 26 L92 34 L84 34 L84 40 L74 40 L74 34 L30 34 L30 44 L20 44 L18 34 L14 34 Z"/>
    <!-- barrel + front sight -->
    <rect x="92" y="28" width="30" height="4"/>
    <rect x="112" y="22" width="4" height="6"/>
    <!-- carry handle / optic -->
    <path d="M40 26 L40 18 L70 18 L70 26 Z"/>
    <!-- magazine (curved box) -->
    <path d="M44 34 L58 34 L56 56 L48 56 Z"/>
    <!-- pistol grip -->
    <path d="M28 34 L38 34 L34 52 L26 52 Z"/>
    <!-- stock -->
    <rect x="8" y="27" width="8" height="8"/>
  </g>
</svg>
