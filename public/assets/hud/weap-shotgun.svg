<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <!-- Side-profile pump-shotgun silhouette (long barrel + underslung pump/tube).
       Hardcoded white fill; used as a CSS mask-image for Halo-cyan tinting (see
       weap-rifle.svg / public/assets/brand/skull.svg). -->
  <g fill="#FFFFFF">
    <!-- receiver -->
    <path d="M20 26 L44 26 L44 40 L28 40 L26 34 L20 34 Z"/>
    <!-- long barrel -->
    <rect x="44" y="27" width="72" height="5"/>
    <!-- magazine tube (under barrel) -->
    <rect x="44" y="34" width="60" height="4"/>
    <!-- pump fore-end -->
    <rect x="70" y="33" width="20" height="7"/>
    <!-- grip -->
    <path d="M22 34 L32 34 L29 52 L20 52 Z"/>
    <!-- stock -->
    <path d="M6 27 L20 27 L20 35 L6 39 Z"/>
  </g>
</svg>
